name: iOS - Build Unsigned IPA

defaults:
  run:
    working-directory: iOS

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: "Build configuration"
        required: true
        default: "Debug"
        type: choice
        options:
          - Debug
          - Release
      scheme:
        description: "Xcode scheme"
        required: true
        default: "DuckDuckGo"
        type: string

jobs:
  build-unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-26-xlarge

    steps:
      - name: Check out the code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Select Xcode
        uses: ./.github/actions/select-xcode-version

      - name: Build unsigned IPA
        env:
          SCHEME: ${{ github.event.inputs.scheme }}
          CONFIGURATION: ${{ github.event.inputs.configuration }}
        run: |
          set -eo pipefail

          ARCHIVE_PATH="${RUNNER_TEMP}/DuckDuckGo.xcarchive"
          EXPORT_PATH="${RUNNER_TEMP}/unsigned-ipa"
          EXPORT_OPTIONS_PLIST="${RUNNER_TEMP}/ExportOptions-unsigned.plist"

          cat > "${EXPORT_OPTIONS_PLIST}" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string></string>
            <key>provisioningProfiles</key>
            <dict/>
            <key>teamID</key>
            <string></string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -workspace DuckDuckGo.xcworkspace \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -destination 'generic/platform=iOS' \
            -archivePath "${ARCHIVE_PATH}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_PATH}" \
            -exportOptionsPlist "${EXPORT_OPTIONS_PLIST}"

          mv "${EXPORT_PATH}"/*.ipa "${GITHUB_WORKSPACE}/iOS/DuckDuckGo-unsigned.ipa"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuckDuckGo-unsigned-ipa
          path: iOS/DuckDuckGo-unsigned.ipa
